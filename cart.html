<!DOCTYPE html>
<html>

<head>
    <title>SAMI</title>
    <link rel="stylesheet" href="css/home_page.css">
    <link rel="stylesheet" href="css/features.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SAMI</div>
        <div class="menu">
            <ul class="nav-links">
                <li><a href="home_page.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li class="show-logged-out"><a href="login_register.html">For Tutors</a></li>
                <li class="show-logged-in"><a href="resources.html">Lessons</a></li>
                <li class="show-logged-in"><a href="profile.html">Account</a></li>
            </ul>
            <div class="icon_cart">
                <button onclick = "window.location.href='cart.html';">
                    <svg id="icon_cart" viewBox="0 0 24 24">
                        <path d="M3 5H5L7 15H17L19 8H8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="9" cy="19" r="1.5" fill="currentColor"/>
                        <circle cx="17" cy="19" r="1.5" fill="currentColor"/>
                    </svg>
                    <span class="cart-badge" id="cartBadge">0</span>
                </button>    
            </div>
            <div class="button-container" id="btn-container">
                <div class="button">
                    <a href="home_page.html#licenses-section">Download App</a>
                </div>
            </div>
        </div>
    </nav>

    <main id="cart-wrapper" class="content-wrapper">
        <div class="profile-card"> <h1 id="welcome-heading">Your Checkout Cart</h1>

            <div id="cart-items-container" class="profile-details">
                <p class="empty-message">Loading your items...</p>
            </div>

            <div class="cart-summary border-top-divider">
                <div class="detail-row total-row">
                    <label>Total Amount:</label>
                    <span id="cart-total">0.00€</span>
                </div>
            </div>

            <div class="cart-actions">
                <button id="clear-cart-btn" class="logout-badge">Clear Cart</button>
                <button id="checkout-btn" class="button btn-pay">Proceed to Payment</button>
            </div>
        </div>
    </main>
    
    <footer class="sami-footer">
        <div class="footer-content">
            <p class="copyright">2026 SAMI. All rights reserved</p>
        </div>
    </footer>

    <script type="module" src="javascript/navbar.js"></script>
    <script type="module" src="javascript/checkout.js"></script>

</body>
</html>
