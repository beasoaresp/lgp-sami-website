<!DOCTYPE html>
<html>

<head>
    <title>SAMI</title>
    <link rel="stylesheet" href="css/home_page.css">
    <link rel="stylesheet" href="css/features.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">SAMI</div>
        <div class="menu">
            <ul class="nav-links">
                <li><a href="home_page.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li class="show-logged-out"><a href="login_register.html">For Tutors</a></li>
                <li class="show-logged-in"><a href="resources.html">Lessons</a></li>
                <li class="show-logged-in"><a href="profile.html">Account</a></li>
            </ul>
            <div class="button-container">
                <div class="button">Download App</div>
            </div>
        </div>
    </nav>

    <main id="profile-wrapper" class="content-wrapper" style="display: none;">
        <div class="profile-card">
            <div class="avatar-circle">
                <span id="avatar-initials">TS</span>
            </div>
            
            <h1 id="welcome-heading">Welcome, Tutor</h1>
            <button id="logout-btn" class="logout-badge">Log Out</button>

            <div class="profile-details">
                <div class="detail-row">
                    <label>Full Name:</label>
                    <span id="profile-fullname">Loading...</span>
                </div>
                <div class="detail-row">
                    <label>Email Address:</label>
                    <span id="profile-email">Loading...</span>
                </div>
                <div class="detail-row">
                    <label>Birthday:</label>
                    <span id="profile-birthday">Loading...</span>
                </div>
            </div>
        </div>
    </main>
    
    <footer class="sami-footer">
        <div class="footer-content">
            <p class="copyright">2026 SAMI. All rights reserved</p>
        </div>
    </footer>

    <script type="module" src="javascript/navbar.js"></script>
    <script type="module" src="javascript/profile.js"></script>

</body>
</html>
