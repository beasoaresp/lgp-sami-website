<!DOCTYPE html>
<html>

<head>
    <title>SAMI</title>
    <link rel="stylesheet" href="css/home_page.css">
    <link rel="stylesheet" href="css/features.css">
    <link rel="stylesheet" href="css/licenses.css">
    <link rel="stylesheet" href="css/contact.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>

    <nav class="navbar">
        <div class="logo">SAMI</div>
        <div class="menu">
            <ul class="nav-links">
                <li><a href="home_page.html">Home</a></li>
                <li><a href="team.html">Team</a></li>
                <li class="show-logged-out"><a href="login_register.html">For Tutors</a></li>
                <li class="show-logged-in"><a href="resources.html">Lessons</a></li>
                <li class="show-logged-in"><a href="profile.html">Account</a></li>
            </ul>
            <div class="button-container">
                <div class="button">Download App</div>
            </div>
        </div>
    </nav>

    <main class="content-wrapper-register">
        <div class="register-tutor-quare-register">  
            <div class="register-content"> 
                <h1>Register Tutor</h1>
                <div class="form_inputs">
                    <form id="register-form">
                        <div class="login_register">
                            <div class="personal-info">
                                <h3>Personal information</h3>
                                <input class="input-registe-tutors" placeholder="First Name" type="text" id="lfirstname" name="lfirstname" required><br>
                                <input class="input-registe-tutors" placeholder="Last Name" type="text" id="llastname" name="llastname" required><br>
                                <input class="input-registe-tutors" placeholder="Birthday" type="date" id="ldata" name="ldata" required><br>
                            </div>
                            <div class="personal-info">
                                <h3>Account information</h3>
                                <input class="input-registe-tutors" placeholder="E-mail" type="email" id="lemail" name="lemail" required><br>
                                <input class="input-registe-tutors" placeholder="Password" type="password" id="lpassword" name="lpassword" required><br>
                                <input class="input-registe-tutors" placeholder="Confirm Password" type="password" id="lconfirmpassword" name="lconfirmpassword" required><br>
                            </div>
                        </div>
                        <div class="register-content"> 
                            <div class="button-container">
                                <button type="submit" class="button">Register</button>
                            </div>
                        </div>
                    </form>    
                </div>
            </div>  
        </div>
    </main>
    
    <footer class="sami-footer">
        <div class="footer-content">
            <p class="copyright">2026 SAMI. All rights reserved</p>
        </div>
    </footer>

    <script type="module" src="javascript/navbar.js"></script>
    <script type="module" src="javascript/register.js"></script>

</body>
